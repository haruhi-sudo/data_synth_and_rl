    max_tokens: 10240
    temperature: 0.9
  FuzzyTaskAgent:
    name: "qwen3-235b-a22b-instruct-2507"
    max_tokens: 10240
    temperature: 0.9
  ToolCheckAgent:
    name: "qwen3-235b-a22b-instruct-2507"
    max_tokens: 10240
    temperature: 0.9
  SolveAgent:
    name: "qwen3-235b-a22b-instruct-2507"
