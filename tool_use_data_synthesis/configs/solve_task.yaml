# Different models for different steps
step_models:
  SolveAgent:
    name: "Local"
    max_tokens: 10240
    temperature: 0.9
  MockToolAgent:
    name: "qwen3-235b-a22b-instruct-2507"
    max_tokens: 10240
    temperature: 0.9

processing:
  max_workers: 1
  max_tasks: 10000

logging:
  repeat_times: 1
  already_processed_path: "logs/solved_qwen3_8b.jsonl"
  solve_path: "output/solve_tool_use/"

paths:
  data_file: "output/tmp/virtual_tool_use.jsonl"

api_configs:
  "Qwen3-235B-A22B-Instruct-2507":
    api_base: "Qwen3_235B_A22B_Instruct_ADDRESS"
    api_key_env: "Qwen3_235B_A22B_Instruct_API_KEY"
  "qwen3-235b-a22b-instruct-2507":
    api_base: "Qwen3_235B_A22B_Instruct_ADDRESS_bailian"
    api_key_env: "Qwen3_235B_A22B_Instruct_API_KEY_bailian"
  "Local":
    api_base: "http://127.0.0.1:30000/v1"
    api_key_env: EMPTY
